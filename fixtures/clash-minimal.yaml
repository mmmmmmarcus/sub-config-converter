mixed-port: 7890
mode: rule
log-level: info
ipv6: true
proxies:
  - name: NodeA
    type: ss
    server: example.server.test
    port: 443
    cipher: aes-128-gcm
    password: SANITIZED
  - name: NodeB
    type: trojan
    server: example.server.test
    port: 443
    password: SANITIZED
    sni: example.com
    skip-cert-verify: true
  - name: NodeC
    type: vmess
    server: example.server.test
    port: 443
    uuid: SANITIZED-UUID
    cipher: auto
    tls: true
    servername: example.com
    skip-cert-verify: true
    network: ws
    ws-opts:
      path: /ws
      headers:
        Host: example.com
proxy-groups:
  - name: Proxy
    type: select
    proxies: [NodeA, NodeB, NodeC]
  - name: Auto
    type: url-test
    proxies: [NodeA, NodeB, NodeC]
rules:
  - DOMAIN-SUFFIX,google.com,Proxy
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
