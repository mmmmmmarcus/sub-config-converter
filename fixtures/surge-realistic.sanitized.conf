[Proxy Group]
Proxy = select, update-interval=0, include-all-proxies=1, no-alert=0, hidden=0

Smart = smart, include-all-proxies=0, include-other-group=Proxy, policy-regex-filter=^(?!IPV6 )(?!.*当前流量)(?!.*到期时间).*, no-alert=0, hidden=0
Streaming = select, Proxy, Smart, DIRECT, include-other-group=Proxy, include-all-proxies=0, policy-regex-filter=^(?!IPV6 )(?!.*当前流量)(?!.*到期时间).*, no-alert=0, hidden=0
AI = select, Proxy, DIRECT, include-other-group=Proxy, policy-regex-filter=^(?!IPV6 ).*(美国|新加坡), no-alert=0, hidden=0, include-all-proxies=0
Apple = select, Smart, Proxy, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Proxy, policy-regex-filter=^(?!IPV6 ).*美国.*
Figma = select, Proxy, Smart, DIRECT, include-all-proxies=0, no-alert=0, hidden=0
TikTok = select, Proxy, Smart, include-other-group=Proxy, no-alert=0, hidden=0, include-all-proxies=0, policy-regex-filter=^(?!IPV6 )(?!.*当前流量)(?!.*到期时间).*
Spotify = select, Proxy, DIRECT, include-all-proxies=0, include-other-group=Proxy, policy-regex-filter=^(?!IPV6 )(?!.*当前流量)(?!.*到期时间).*, no-alert=0, hidden=0
Final = select, Proxy, Smart, DIRECT, include-all-proxies=0, no-alert=0, hidden=0

