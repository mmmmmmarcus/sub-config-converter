[General]
mode = rule
loglevel = info
ipv6 = true

[Proxy]
NodeA = ss, example.server.test, 443, encrypt-method=aes-128-gcm, password=SANITIZED
NodeB = trojan, example.server.test, 443, password=SANITIZED, sni=example.com, skip-cert-verify=true
NodeC = vmess, example.server.test, 443, username=SANITIZED-UUID, ws=true, ws-path=/ws, ws-headers=Host:"example.com", encrypt-method=auto, vmess-aead=true, tls=true, skip-cert-verify=true, sni=example.com

[Proxy Group]
Proxy = select, NodeA, NodeB, NodeC
Auto = url-test, NodeA, NodeB, NodeC

[Rule]
DOMAIN-SUFFIX,google.com,Proxy
GEOIP,CN,DIRECT
FINAL,Proxy
