[General]
mode = rule
loglevel = info
ipv6 = true

[Proxy]
NodeV = vmess, example.server.test, 443, username=SANITIZED-UUID, ws=true, ws-path=/ws, ws-headers=Host:"example.com", vmess-aead=true, tls=true, skip-cert-verify=true, sni=example.com

[Proxy Group]
Proxy = select, NodeV

[Rule]
FINAL,Proxy
